<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WebGL × Haptics — Collision Feedback Demo</title>
  <meta name="description"
    content="Physics-based 3D demo where object collisions trigger haptic feedback on mobile devices." />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/WebHapticsTest/assets/index-WoQInek1.js"></script>
  <link rel="stylesheet" crossorigin href="/WebHapticsTest/assets/index-2ZR95KbQ.css">
</head>

<body>
  <canvas id="webgl-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">
      <span class="hud-icon">🫨</span>
      <h1>Collision Haptics</h1>
    </div>
    <p id="hud-instruction">Drag & throw cubes to feel collision impacts</p>
  </div>

  <!-- Collision indicator -->
  <div id="collision-flash"></div>

  <!-- Impact meter -->
  <div id="impact-meter">
    <div id="impact-label">IMPACT</div>
    <div id="impact-bar-container">
      <div id="impact-bar"></div>
    </div>
  </div>

  <!-- Controls -->
  <div id="controls">
    <button id="btn-drop" title="Drop new object">＋ Drop</button>
    <button id="btn-reset" title="Reset scene">⟳ Reset</button>
  </div>

  <!-- Footer -->
  <div id="footer">
    <span>Powered by <a href="https://haptics.lochie.me/" target="_blank" rel="noopener">web-haptics</a> + Three.js +
      cannon-es</span>
  </div>

</body>

</html>
