<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WebGL × Haptics — Animation Sync Demo</title>
  <meta name="description" content="3D animation with perfectly synchronized haptic feedback on mobile devices." />
  <meta name="theme-color" content="#0a0a1a" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫨</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <canvas id="webgl-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-title">
      <span class="hud-icon">🫨</span>
      <h1>Haptic Sync</h1>
    </div>
    <p id="hud-subtitle">3D Animation × Haptic Feedback</p>
  </div>

  <!-- Timeline progress -->
  <div id="timeline">
    <div id="timeline-bar"></div>
  </div>

  <!-- Play button (centered, large) -->
  <div id="play-container">
    <button id="btn-play">
      <span id="play-icon">▶</span>
      <span id="play-text">Play</span>
    </button>
    <p id="play-hint">Tap to start animation with haptic feedback</p>
  </div>

  <!-- Impact flash overlay -->
  <div id="collision-flash"></div>

  <!-- Footer -->
  <div id="footer">
    <span>Powered by <a href="https://haptics.lochie.me/" target="_blank" rel="noopener">web-haptics</a> +
      Three.js</span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
